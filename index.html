<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Shinjuku Capsule Hotel</title>

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
}

video{
    width:100vw;
    height:100vh;
    object-fit:cover;
}

#loading{
    position:absolute;
    color:white;
    font-size:2rem;
    font-weight:bold;
    text-shadow:0 0 10px rgba(0,0,0,.5);
}
</style>
</head>

<body>



<video id="intro" autoplay muted playsinline>
    <source src="intro.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("intro");

video.onplay = () => {
    document.getElementById("loading").style.display="none";
}

video.onended = () => {
    // Create fade overlay
    const fade = document.createElement("div");
    fade.style.position = "fixed";
    fade.style.top = "0";
    fade.style.left = "0";
    fade.style.width = "100%";
    fade.style.height = "100%";
    fade.style.background = "white";
    fade.style.opacity = "0";
    fade.style.transition = "opacity 1.5s ease";
    fade.style.zIndex = "9999";
    document.body.appendChild(fade);

    // Start fade
    setTimeout(() => {
        fade.style.opacity = "1";
    }, 50);

    // Redirect after fade
    setTimeout(() => {
       window.location.href = "language.html";
},1800);

// If the video can't play, redirect after 3 seconds.
video.onerror = () => {
    setTimeout(()=>{
       window.location.href = "language.html";
}, 3000);
</script>

</body>
</html>
